spring.application.name=it

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.otp.expiry-minutes=10

# Configure SMTP to enable OTP emails for signup
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:8karthikeyanr@gmail.com}}

# Blog AI/plagiarism analysis and publish gating
app.content-analysis.ai-threshold=${AI_CONTENT_THRESHOLD:15}
app.content-analysis.plagiarism-threshold=${PLAGIARISM_THRESHOLD:5}
app.content-analysis.minimum-words=${ANALYSIS_MIN_WORDS:40}

# Optional external detector (ChatZero/Copyleaks-compatible adapter endpoint).
# If empty, backend uses built-in heuristic analysis.
app.content-analysis.custom-provider-url=${CONTENT_ANALYSIS_PROVIDER_URL:}
app.content-analysis.custom-provider-api-key=${CONTENT_ANALYSIS_PROVIDER_API_KEY:8f598465-65ac-4f49-a1f6-b80ab6325480}

# Direct Copyleaks integration (login + writer detector + authenticity scan)
app.content-analysis.copyleaks.enabled=${COPYLEAKS_ENABLED:true}
app.content-analysis.copyleaks.email=${COPYLEAKS_EMAIL:8karthikeyanr@gmail.com}
app.content-analysis.copyleaks.key=${COPYLEAKS_KEY:${CONTENT_ANALYSIS_PROVIDER_API_KEY:8f598465-65ac-4f49-a1f6-b80ab6325480}}
app.content-analysis.copyleaks.use-sandbox=${COPYLEAKS_USE_SANDBOX:false}

server.port=${PORT:8080}